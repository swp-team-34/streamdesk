name: Other PBI
description: Product backlog item that is not a user story
title: "PBI: "
labels:
  - pbi
body:
  - type: dropdown
    id: pbi-type
    attributes:
      label: Type
      options:
        - Technical task
        - Documentation
        - Research
        - Infrastructure
        - Refactoring
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe the scope, context, constraints, and assumptions.
    validations:
      required: true
  - type: dropdown
    id: work-status
    attributes:
      label: Work Status
      options:
        - Backlog
        - Selected for Sprint
        - In Progress
        - In Review
        - Done
    validations:
      required: true
  - type: dropdown
    id: moscow-priority
    attributes:
      label: MoSCoW priority, if applicable
      options:
        - Must
        - Should
        - Could
        - Won't for this release
        - Not applicable
    validations:
      required: true
  - type: input
    id: story-points
    attributes:
      label: Story Points, if applicable
      placeholder: "3 or Not applicable"
  - type: input
    id: mvp-version
    attributes:
      label: MVP version, if applicable
      placeholder: MVP v1 or Not applicable
  - type: input
    id: milestone
    attributes:
      label: Milestone, if applicable
      placeholder: Sprint 1 or Not applicable
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Use a checklist when the item is Sprint-ready or required for MVP v1.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: input
    id: implementer
    attributes:
      label: Implementer
      placeholder: GitHub username or team member name
    validations:
      required: true
  - type: input
    id: reviewer
    attributes:
      label: Reviewer
      placeholder: GitHub username or team member name
    validations:
      required: true
  - type: textarea
    id: evidence-notes
    attributes:
      label: Evidence / deliverable notes
      placeholder: Link PRs, screenshots, reports, commands, or other verification evidence.
    validations:
      required: true
