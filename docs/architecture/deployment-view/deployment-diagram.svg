t fill="#FFFFFF" height="55.5938" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="181.4434" x="243.5" y="533.1094"/><polygon fill="#FFFFFF" points="407.9434,538.1094,407.9434,552.1094,419.9434,552.1094,419.9434,544.1094,413.9434,538.1094,407.9434,538.1094" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="413.9434" x2="413.9434" y1="538.1094" y2="544.1094"/><line style="stroke:#000000;stroke-width:1;" x1="419.9434" x2="413.9434" y1="544.1094" y2="544.1094"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="103.7422" x="253.5" y="559.1045">Express server</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="151.4434" x="253.5" y="575.4014">(port 5000, localhost)</text></g><!--entity API--><g class="entity" data-qualified-name="VPS.NodeApp.API" data-source-line="14" id="ent0006"><rect fill="#FFFFFF" height="55.5938" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="141.6514" x="460" y="533.1094"/><polygon fill="#FFFFFF" points="584.6514,538.1094,584.6514,552.1094,596.6514,552.1094,596.6514,544.1094,590.6514,538.1094,584.6514,538.1094" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="590.6514" x2="590.6514" y1="538.1094" y2="544.1094"/><line style="stroke:#000000;stroke-width:1;" x1="596.6514" x2="590.6514" y1="544.1094" y2="544.1094"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="111.6514" x="470" y="559.1045">REST API routes</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="72.748" x="470" y="575.4014">(routes.ts)</text></g><!--entity Sync--><g class="entity" data-qualified-name="VPS.NodeApp.Sync" data-source-line="15" id="ent0007"><rect fill="#FFFFFF" height="55.5938" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="207.3926" x="637.5" y="533.1094"/><polygon fill="#FFFFFF" points="827.8926,538.1094,827.8926,552.1094,839.8926,552.1094,839.8926,544.1094,833.8926,538.1094,827.8926,538.1094" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="833.8926" x2="833.8926" y1="538.1094" y2="544.1094"/><line style="stroke:#000000;stroke-width:1;" x1="839.8926" x2="833.8926" y1="544.1094" y2="544.1094"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="177.3926" x="647.5" y="559.1045">YouGile background sync</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="82.8447" x="647.5" y="575.4014">(in-process)</text></g><!--entity DB--><g class="entity" data-qualified-name="VPS.Postgres.DB" data-source-line="19" id="ent0009"><rect fill="#FFFFFF" height="39.2969" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="181.6279" x="650" y="777.6094"/><polygon fill="#FFFFFF" points="814.6279,782.6094,814.6279,796.6094,826.6279,796.6094,826.6279,788.6094,820.6279,782.6094,814.6279,782.6094" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="820.6279" x2="820.6279" y1="782.6094" y2="788.6094"/><line style="stroke:#000000;stroke-width:1;" x1="826.6279" x2="820.6279" y1="788.6094" y2="788.6094"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="151.6279" x="660" y="803.6045">streamdesk database</text></g><!--entity Schema--><g class="entity" data-qualified-name="VPS.Postgres.Schema" data-source-line="20" id="ent0010"><rect fill="#FFFFFF" height="55.5938" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="207.8779" x="407" y="769.1094"/><polygon fill="#FFFFFF" points="597.8779,774.1094,597.8779,788.1094,609.8779,788.1094,609.8779,780.1094,603.8779,774.1094,597.8779,774.1094" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="603.8779" x2="603.8779" y1="774.1094" y2="780.1094"/><line style="stroke:#000000;stroke-width:1;" x1="609.8779" x2="603.8779" y1="780.1094" y2="780.1094"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="177.8779" x="417" y="795.1045">Drizzle-managed schema</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="105.6494" x="417" y="811.4014">and migrations</text></g><!--entity Browser--><g class="entity" data-qualified-name="Browsers.Browser" data-source-line="27" id="ent0013"><rect fill="#FFFFFF" height="55.5938" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="201.165" x="233.5" y="97.6094"/><polygon fill="#FFFFFF" points="417.665,102.6094,417.665,116.6094,429.665,116.6094,429.665,108.6094,423.665,102.6094,417.665,102.6094" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="423.665" x2="423.665" y1="102.6094" y2="108.6094"/><line style="stroke:#000000;stroke-width:1;" x1="429.665" x2="423.665" y1="108.6094" y2="108.6094"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="171.165" x="243.5" y="123.6045">Chrome / Firefox / Safari</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="82.3867" x="243.5" y="139.9014">(React SPA)</text></g><!--entity YouGile--><g class="entity" data-qualified-name="External.YouGile" data-source-line="31" id="ent0015"><rect fill="#FFFFFF" height="55.5938" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="150.292" x="965" y="769.1094"/><polygon fill="#FFFFFF" points="1098.292,774.1094,1098.292,788.1094,1110.292,788.1094,1110.292,780.1094,1104.292,774.1094,1098.292,774.1094" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="1104.292" x2="1104.292" y1="774.1094" y2="780.1094"/><line style="stroke:#000000;stroke-width:1;" x1="1110.292" x2="1104.292" y1="780.1094" y2="780.1094"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="120.292" x="975" y="795.1045">YouGile REST API</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="76.9932" x="975" y="811.4014">(task sync)</text></g><g class="entity" data-qualified-name="GMN23" data-source-line="48" id="ent0024"><path d="M944.5,267.1094 L944.5,383.0391 L1143.4185,383.0391 L1143.4185,277.1094 L1133.4185,267.1094 L944.5,267.1094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1133.4185,267.1094 L1133.4185,277.1094 L1143.4185,277.1094 L1133.4185,267.1094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="109.1353" x="950.5" y="284.1763">Nginx is the only</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="177.9185" x="950.5" y="299.3091">internet-facing component.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="162.2651" x="950.5" y="314.4419">It terminates TLS, serves</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="124.9473" x="950.5" y="329.5747">the static SPA from</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="100.9214" x="950.5" y="344.7075">/client/dist, and</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="157.8726" x="950.5" y="359.8403">reverse-proxies /api/* to</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="132.4185" x="950.5" y="374.9731">the Node.js process.</text></g><g class="entity" data-qualified-name="GMN26" data-source-line="58" id="ent0027"><path d="M1151.5,518.1094 L1151.5,603.7734 L1338.0532,603.7734 L1338.0532,528.1094 L1328.0532,518.1094 L1151.5,518.1094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1328.0532,518.1094 L1328.0532,528.1094 L1338.0532,528.1094 L1328.0532,518.1094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="158.4629" x="1157.5" y="535.1763">A single Node.js process</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="156.2476" x="1157.5" y="550.3091">hosts both the REST API</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="165.5532" x="1157.5" y="565.4419">and the YouGile sync job.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="165.1533" x="1157.5" y="580.5747">PM2 watches the process</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="155.8857" x="1157.5" y="595.7075">and restarts it on crash.</text></g><g class="entity" data-qualified-name="GMN29" data-source-line="66" id="ent0030"><path d="M1150.5,754.1094 L1150.5,839.7734 L1333.5176,839.7734 L1333.5176,764.1094 L1323.5176,754.1094 L1150.5,754.1094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1323.5176,754.1094 L1323.5176,764.1094 L1333.5176,764.1094 L1323.5176,754.1094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="153.5054" x="1156.5" y="771.1763">PostgreSQL runs on the</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="144.6694" x="1156.5" y="786.3091">same host as the app.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="162.0176" x="1156.5" y="801.4419">Backups are expected to</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="158.1519" x="1156.5" y="816.5747">be performed externally</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="151.1758" x="1156.5" y="831.7075">(e.g. pg_dump + cron).</text></g><g class="entity" data-qualified-name="GMN32" data-source-line="74" id="ent0033"><path d="M941,503.1094 L941,619.0391 L1117.3906,619.0391 L1117.3906,513.1094 L1107.3906,503.1094 L941,503.1094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1107.3906,503.1094 L1107.3906,513.1094 L1117.3906,513.1094 L1107.3906,503.1094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="128.5527" x="947" y="520.1763">This is a single-host</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="150.249" x="947" y="535.3091">deployment chosen for</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="155.3906" x="947" y="550.4419">MVP v2. It is simple and</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="154.3433" x="947" y="565.5747">cheap, but introduces a</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="137.9155" x="947" y="580.7075">single point of failure</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="132.9326" x="947" y="595.8403">and limits horizontal</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="69.4751" x="947" y="610.9731">scalability.</text></g><!--link Browser to Nginx--><g class="link" data-entity-1="ent0013" data-entity-2="ent0003" data-link-type="dependency" data-source-line="35" id="lnk16"><path d="M334,153.6594 C334,189.2594 334,245.8394 334,284.4594" fill="none" id="Browser-to-Nginx" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="334,290.4594,338,281.4594,334,285.4594,330,281.4594,334,290.4594" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="80.8374" x="335" y="198.6763">HTTPS (443)</text></g><!--link Nginx to Uploads--><g class="link" data-entity-1="ent0003" data-entity-2="ent0011" data-link-type="dependency" data-source-line="37" id="lnk17"><path d="M265.37,342.4994 C209.68,359.8094 134.74,393.1594 99,453.1094 C36.92,557.2194 100.1934,704.5998 131.1034,764.9098" fill="none" id="Nginx-to-Uploads" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="133.84,770.2494,133.2948,760.4156,131.5595,765.7997,126.1754,764.0645,133.84,770.2494" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="75.6323" x="108.0837" y="558.1763">serve static</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="91.7998" x="100" y="573.3091">frontend build</text></g><!--link Nginx to Express--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="38" id="lnk18"><path d="M334,359.6394 C334,406.2694 334,483.8094 334,526.8394" fill="none" id="Nginx-to-Express" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="334,532.8394,338,523.8394,334,527.8394,330,523.8394,334,532.8394" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="76.1592" x="353.4209" y="426.1763">proxy /api/*</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="113.001" x="335" y="441.3091">to localhost:5000</text></g><!--link Express to Postgres--><g class="link" data-entity-1="ent0005" data-entity-2="ent0008" data-link-type="dependency" data-source-line="40" id="lnk19"><path d="M343.24,589.4794 C351.38,614.9494 362.73,654.1294 368,689.1094 C368.4363,692.0044 368.8339,694.9482 369.1962,697.9238 C369.3773,699.4116 369.5495,700.9074 369.7133,702.409 C369.7952,703.1598 369.2595,697.9437 369.3372,698.6971" fill="none" id="Express-to-Postgres" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="369.9527,704.6655,373.0084,695.3026,369.4398,699.6919,365.0506,696.1232,369.9527,704.6655" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="62.0737" x="379.4954" y="662.1763">TCP 5432</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="87.0645" x="367" y="677.3091">(local socket)</text></g><!--link Express to Uploads--><g class="link" data-entity-1="ent0005" data-entity-2="ent0011" data-link-type="dependency" data-source-line="41" id="lnk20"><path d="M306.78,589.4894 C290.6,606.2194 269.97,628.3294 253,649.1094 C219.67,689.9094 188.1905,735.4786 168.2105,765.4186" fill="none" id="Express-to-Uploads" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="164.88,770.4094,173.2029,765.1436,167.6554,766.2504,166.5486,760.7029,164.88,770.4094" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="97.3286" x="254" y="669.6763">read/write files</text></g><!--link Express to YouGile--><g class="link" data-entity-1="ent0005" data-entity-2="ent0015" data-link-type="dependency" data-source-line="42" id="lnk21"><path d="M369.93,589.2894 C390.33,603.3694 416.93,619.5694 443,629.1094 C587.8,682.0994 633.31,659.6894 786,681.1094 C813.51,684.9694 821.61,680.4094 848,689.1094 C904.9,707.8594 959.2345,740.521 996.6145,765.551" fill="none" id="Express-to-YouGile" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="1001.6,768.8894,996.3473,760.5582,997.4454,766.1074,991.8962,767.2055,1001.6,768.8894" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="41.7485" x="795.1948" y="662.1763">HTTPS</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="58.1382" x="787" y="677.3091">REST API</text></g><!--link Sync to YouGile--><g class="link" data-entity-1="ent0007" data-entity-2="ent0015" data-link-type="dependency" data-source-line="44" id="lnk22"><path d="M775.59,589.1794 C833.08,634.1794 942.945,720.1515 1000.535,765.2215" fill="none" id="Sync-to-YouGile" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="1005.26,768.9194,1000.6376,760.2226,1001.3225,765.8379,995.7072,766.5227,1005.26,768.9194" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="52.1714" x="902.4099" y="662.1763">periodic</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="74.9912" x="891" y="677.3091">HTTPS calls</text></g><!--link Nginx to GMN23--><g class="link" data-entity-1="ent0003" data-entity-2="ent0024" data-link-type="association" data-source-line="48" id="lnk25"><path d="M345.29,290.5494 C358.32,257.5194 383.39,210.4294 424.5,194.1094 C474.38,174.2994 857.62,174.2994 907.5,194.1094 C944.59,208.8394 977.22,239.0894 1001.27,266.8194" fill="none" id="Nginx-GMN23" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link NodeApp to GMN26--><g class="link" data-entity-1="ent0004" data-entity-2="ent0027" data-link-type="association" data-source-line="58" id="lnk28"><path d="M210.71,468.7184 C210.7735,468.4828 210.8376,468.2473 210.9023,468.0121 C211.0318,467.5417 211.1637,467.0721 211.2982,466.6035 C211.5671,465.6662 211.8461,464.7327 212.1356,463.8035 C213.2934,460.0869 214.6179,456.4401 216.1291,452.9016 C222.1737,438.7475 231.205,426.3269 244.5,418.1094 C327.01,367.1094 1028.98,378.4394 1117.5,418.1094 C1162.88,438.4494 1198.74,483.7994 1220.72,518.0094" fill="none" id="NodeApp-GMN26" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link Postgres to GMN29--><g c