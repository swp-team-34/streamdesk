s</text></g><!--entity YouGile--><g class="entity" data-qualified-name="External.YouGile" data-source-line="40" id="ent0021"><rect fill="#FFFFFF" height="36.2969" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="99.8301" x="900" y="111.4461"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="79.8301" x="910" y="134.4412">YouGile API</text></g><!--entity Users--><g class="entity" data-qualified-name="External.Users" data-source-line="41" id="ent0022"><rect fill="#FFFFFF" height="52.5938" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="127.2354" x="737.5" y="102.9461"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="107.2354" x="747.5" y="125.9412">Browser clients</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="102.2041" x="747.5" y="142.2381">(staff, admins)</text></g><g class="entity" data-qualified-name="GMN39" data-source-line="74" id="ent0040"><path d="M1199.5,400.4461 L1199.5,486.1101 L1398.7866,486.1101 L1398.7866,410.4461 L1388.7866,400.4461 L1199.5,400.4461" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1388.7866,400.4461 L1388.7866,410.4461 L1398.7866,410.4461 L1388.7866,400.4461" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="178.2866" x="1205.5" y="417.513">All route handlers currently</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="93.6152" x="1205.5" y="432.6458">live in a single</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="66.2568" x="1303.2476" y="432.6458">routes.ts</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="161.7637" x="1205.5" y="447.7786">file (~9000 lines). This is</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="159.3198" x="1205.5" y="462.9114">the main maintainability</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="151.5503" x="1205.5" y="478.0442">risk of the server layer.</text></g><g class="entity" data-qualified-name="GMN42" data-source-line="82" id="ent0043"><path d="M1095.5,878.4461 L1095.5,964.1101 A0,0 0 0 0 1095.5,964.1101 L1286.0332,964.1101 A0,0 0 0 0 1286.0332,964.1101 L1286.0332,888.4461 L1276.0332,878.4461 L1195,878.4461 L1191,807.5561 L1187,878.4461 L1095.5,878.4461 A0,0 0 0 0 1095.5,878.4461" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1276.0332,878.4461 L1276.0332,888.4461 L1286.0332,888.4461 L1276.0332,878.4461" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="151.728" x="1101.5" y="895.513">The Equipment module</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="166.5625" x="1101.5" y="910.6458">(warehouse) is treated as</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="45.3032" x="1101.5" y="925.7786">stable</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="107.3579" x="1146.8032" y="925.7786">: its architecture</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="169.5332" x="1101.5" y="940.9114">is not expected to change</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="110.3667" x="1101.5" y="956.0442">in the near term.</text></g><g class="entity" data-qualified-name="GMN45" data-source-line="90" id="ent0046"><path d="M1434,400.4461 L1434,486.1101 L1645.6074,486.1101 L1645.6074,410.4461 L1635.6074,400.4461 L1434,400.4461" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1635.6074,400.4461 L1635.6074,410.4461 L1645.6074,410.4461 L1635.6074,400.4461" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="170.6313" x="1440" y="417.513">The same Zod schemas in</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="129.7715" x="1440" y="432.6458">shared/schema.ts</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="56.7036" x="1573.9038" y="432.6458">are used</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="161.4272" x="1440" y="447.7786">by the client (forms) and</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="145.6025" x="1440" y="462.9114">by the server (request</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="73.2075" x="1440" y="478.0442">validation).</text></g><!--link Users to HTTP--><g class="link" data-entity-1="ent0022" data-entity-2="ent0007" data-link-type="dependency" data-source-line="45" id="lnk23"><path d="M744.84,155.9761 C694.73,178.7461 627.2021,209.443 576.9821,232.273" fill="none" id="Users-to-HTTP" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="571.52,234.7561,581.3685,234.6729,576.0717,232.6868,578.0578,227.3901,571.52,234.7561" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="86.436" x="668" y="201.013">HTTPS / JSON</text></g><!--link TaskUI to HTTP--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007" data-link-type="dependency" data-source-line="46" id="lnk24"><path d="M539.88,156.1261 C534.44,178.9161 527.9312,206.1996 522.5012,228.9796" fill="none" id="TaskUI-to-HTTP" style="stroke:#000000;stroke-width:1;"/><