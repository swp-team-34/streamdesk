5">Chrome / Firefox / Safari</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="82.3867" x="1114.5" y="139.9014">(React SPA)</text></g><!--entity YouGile--><g class="entity" data-qualified-name="External.YouGile" data-source-line="37" id="ent0019"><rect fill="#FFFFFF" height="55.5938" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="150.292" x="1835" y="896.6094"/><polygon fill="#FFFFFF" points="1968.292,901.6094,1968.292,915.6094,1980.292,915.6094,1980.292,907.6094,1974.292,901.6094,1968.292,901.6094" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="1974.292" x2="1974.292" y1="901.6094" y2="907.6094"/><line style="stroke:#000000;stroke-width:1;" x1="1980.292" x2="1974.292" y1="907.6094" y2="907.6094"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="120.292" x="1845" y="922.6045">YouGile REST API</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="76.9932" x="1845" y="938.9014">(task sync)</text></g><g class="entity" data-qualified-name="GMN22" data-source-line="46" id="ent0023"><path d="M1814.5,325.6094 L1814.5,471.8047 L2011.2031,471.8047 L2011.2031,335.6094 L2001.2031,325.6094 L1814.5,325.6094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M2001.2031,325.6094 L2001.2031,335.6094 L2011.2031,335.6094 L2001.2031,325.6094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="168.6001" x="1820.5" y="342.6763">Nginx terminates TLS and</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="157.4727" x="1820.5" y="357.8091">routes browser traffic to</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="164.5566" x="1820.5" y="372.9419">the StreamDesk runtime.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="136.4619" x="1820.5" y="388.0747">Depending on server</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="175.7031" x="1820.5" y="403.2075">configuration, static assets</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="169.8633" x="1820.5" y="418.3403">may be served directly by</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="155.6763" x="1820.5" y="433.4731">Nginx or by the Express</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="163.6997" x="1820.5" y="448.606">production static handler</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="106.0313" x="1820.5" y="463.7388">from dist/public.</text></g><g class="entity" data-qualified-name="GMN29" data-source-line="65" id="ent0030"><path d="M2022,622.1094 L2022,722.9063 L2210.3623,722.9063 L2210.3623,632.1094 L2200.3623,622.1094 L2022,622.1094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M2200.3623,622.1094 L2200.3623,632.1094 L2210.3623,632.1094 L2200.3623,622.1094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="158.4629" x="2028" y="639.1763">A single Node.js process</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="126.7056" x="2028" y="654.3091">hosts the REST API,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="167.3623" x="2028" y="669.4419">WebSocket Gateway, and</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="136.9634" x="2028" y="684.5747">the YouGile sync job.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="165.1533" x="2028" y="699.7075">PM2 watches the process</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="155.8857" x="2028" y="714.8403">and restarts it on crash.</text></g><g class="entity" data-qualified-name="GMN32" data-source-line="74" id="ent0033"><path d="M2020.5,866.6094 L2020.5,982.5391 L2195.0054,982.5391 L2195.0054,876.6094 L2185.0054,866.6094 L2020.5,866.6094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M2185.0054,866.6094 L2185.0054,876.6094 L2195.0054,876.6094 L2185.0054,866.6094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="153.5054" x="2026.5" y="883.6763">PostgreSQL runs on the</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="144.6694" x="2026.5" y="898.8091">same host as the app.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="151.3535" x="2026.5" y="913.9419">Schema migrations are</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="131.2886" x="2026.5" y="929.0747">handled via runtime</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="143.8696" x="2026.5" y="944.2075">schema guards rather</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="145.7168" x="2026.5" y="959.3403">than a strict migration</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="62.3657" x="2026.5" y="974.4731">workflow.</text></g><g class="entity" data-qualified-name="GMN35" data-source-line="84" id="ent0036"><path d="M1811,614.6094 L1811,730.5391 L1987.3906,730.5391 L1987.3906,624.6094 L1977.3906,614.6094 L1811,614.6094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1977.3906,614.6094 L1977.3906,624.6094 L1987.3906,624.6094 L1977.3906,614.6094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="128.5527" x="1817" y="631.6763">This is a single-host</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="150.249" x="1817" y="646.8091">deployment chosen for</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="155.3906" x="1817" y="661.9419">MVP v2. It is simple and</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="154.3433" x="1817" y="677.0747">cheap, but introduces a</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="137.9155" x="1817" y="692.2075">single point of failure</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="132.9326" x="1817" y="707.3403">and limits horizontal</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="69.4751" x="1817" y="722.4731">scalability.</text></g><!--link Browser to Nginx--><g class="link" data-entity-1="ent0017" data-entity-2="ent0003" data-link-type="dependency" data-source-line="41" id="lnk20"><path d="M1205,153.8394 C1205,187.6594 1205,247.2419 1205,299.0331 C1205,300.6516 1205,302.2625 1205,303.8647 C1205,304.6658 1205,299.4648 1205,300.2615" fill="none" id="Browser-to-Nginx" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="1205,306.2615,1209,297.2615,1205,301.2615,1201,297.2615,1205,306.2615" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="80.8374" x="1206" y="198.6763">HTTPS (443)</text></g><!--link Nginx to Express--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="dependency" data-source-line="43" id="lnk21"><path d="M1129.2201,402.9752 C1128.5154,403.0213 1127.8065,403.068 1127.0935,403.1154 C1125.6675,403.2101 1124.225,403.3074 1122.7662,403.4073 C1119.8487,403.6071 1116.8663,403.8173 1113.8209,404.0384 C1107.7303,404.4807 1101.3883,404.9669 1094.8116,405.5012 C1081.6582,406.5698 1067.5664,407.8311 1052.6704,409.3195 C1022.8785,412.2964 989.8703,416.1819 954.7213,421.2519 C814.125,441.5319 639.275,480.7644 499,556.6094 C462.64,576.2694 433.5836,605.7805 411.8136,631.7605" fill="none" id="Nginx-to-Express" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="407.96,636.3594,416.8064,632.0302,411.1714,632.527,410.6745,626.892,407.96,636.3594" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="76.1592" x="653.9534" y="514.6763">proxy /api/*</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="67.5581" x="658.2539" y="529.8091">and /ws to</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="172.0659" x="606" y="544.9419">StreamDesk Node process</text></g><!--link Nginx to GMN22--><g class="link" data-entity-1="ent0003" data-entity-2="ent0023" data-link-type="association" data-source-line="46" id="lnk24"><path d="M1207.2217,306.3406 C1207.2747,305.9858 1207.3282,305.6308 1207.3825,305.2756 C1214.3275,259.8119 1232.22,211.2944 1275.5,194.1094 C1327.34,173.5194 1725.66,173.5194 1777.5,194.1094 C1833.41,216.3094 1868.87,276.2694 1889.43,325.5594" fill="none" id="Nginx-GMN22" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link Express to Postgres--><g class="link" data-entity-1="ent0006" data-entity-2="ent0011" data-link-type="dependency" data-source-line="57" id="lnk25"><path d="M444.82,708.6794 C462,716.9294 480.86,724.9594 499,730.6094 C692.67,790.9394 788.37,678.0494 950,800.6094 C973.555,818.4744 987.49,848.5494 995.5675,874.4881 C996.0723